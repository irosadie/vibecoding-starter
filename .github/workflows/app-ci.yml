name: App CI

on:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - "tsconfig.base.json"
      - "biome.json"
      - ".github/workflows/app-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - "tsconfig.base.json"
      - "biome.json"
      - ".github/workflows/app-ci.yml"

concurrency:
  group: app-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        check:
          - lint
          - typecheck
          - test
          - test:smoke
          - build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ${{ matrix.check }}
        env:
          NODE_ENV: test
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3001
          API_PORT: 3001
          REDIS_URL: redis://127.0.0.1:6379
        run: bun run ${{ matrix.check }}
