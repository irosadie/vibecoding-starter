services:
  postgres:
    image: postgres:16-alpine
    container_name: vibecoding-starter-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vibecoding_starter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vibecoding_starter"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vibecoding-starter-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
